# Everything at the top level here is happening at the scope of http in nginx.conf.
map $http_cookie $has_session {
  default 0;
  ~sessionid 1; # Django session cookie
}

# Re-resolve the app container by name at request time (Docker's embedded
# DNS). A static upstream block pins the IP from nginx startup, so a deploy
# that recreates twlight on a new IP leaves us proxying to a dead address.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
  # if no Host match, close the connection to prevent host spoofing
  listen 80 default_server;
  return 444;
}

server {
    listen 80 deferred;
    client_max_body_size 4G;
    server_name localhost twlight.vagrant.localdomain;
    keepalive_timeout 5;
    # Send default logs to stdout
    access_log /dev/stdout;

    root /app;

    location / {
      # checks for static file, if not found proxy to app
      try_files $uri @twlight;
    }

    location @twlight {
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $http_host;
      # we don't want nginx trying to do something clever with
      # redirects, we set the Host: header above already.
      proxy_redirect off;
      # $request_uri is required: with a variable in proxy_pass and no URI
      # part, nginx would forward the decoded $uri and drop the query string.
      set $twlight_upstream twlight;
      proxy_pass http://$twlight_upstream:80$request_uri;
    }

    error_page 500 502 503 504 /500.html;

    location /500-dog.jpeg {
        root /app/500/;
    }

    location /500-Wikipedia_Library_owl.svg {
        root /app/500/;
    }

    location ~ .+/((500-Wikipedia_Library_owl\.svg)|(500-dog\.jpeg))$ {
        try_files $uri /$1;
    }

    location /500.html {
        internal;
        root /app/500/;
    }
}
