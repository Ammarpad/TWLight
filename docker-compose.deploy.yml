---
name: ${TWLIGHT_ENV:?set TWLIGHT_ENV in .env (see template.env)}

# The db root password rides in .env for the db service. The app connects as
# DJANGO_DB_USER and never reads it, so we blank the copy that env_file'ing .env
# would otherwise hand the app containers.
x-app-no-root-pw: &app-no-root-pw
  MYSQL_ROOT_PASSWORD: ""

services:
  db:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DJANGO_DB_NAME: ${DJANGO_DB_NAME}
      DJANGO_DB_USER: ${DJANGO_DB_USER}
      DJANGO_DB_PASSWORD: ${DJANGO_DB_PASSWORD}
    restart: unless-stopped
  migrate:
    image: quay.io/wikipedialibrary/twlight:branch_${TWLIGHT_ENV}
    depends_on:
      - 'db'
    volumes:
      - type: bind
        source: /usr/local/backup
        target: /app/backup
      - type: bind
        source: ./media
        target: /app/media
    env_file:
      - path: ./conf/${TWLIGHT_ENV}.twlight.env
        required: true
      - path: .env
        required: true
    environment: *app-no-root-pw
    command: >
      bash -c "/app/bin/backup.sh && /app/bin/migrate.sh"
    restart: on-failure
  twlight:
    image: quay.io/wikipedialibrary/twlight:branch_${TWLIGHT_ENV}
    depends_on:
      - 'migrate'
    volumes:
      - type: bind
        source: /usr/local/backup
        target: /app/backup
    env_file:
      - path: ./conf/${TWLIGHT_ENV}.twlight.env
        required: true
      - path: .env
        required: true
    environment: *app-no-root-pw
    restart: unless-stopped
  web:
    volumes:
      - type: volume
        target: /var/lib/nginx/cache
      - type: bind
        source: ./conf/${TWLIGHT_ENV}.nginx.conf
        target: /etc/nginx/conf.d/default.conf
    restart: unless-stopped
