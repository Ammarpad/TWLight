---
services:
  db:
    secrets: !reset null
    env_file:
      - path: .env
        required: true
    environment:
      # Base sets MYSQL_ROOT_PASSWORD_FILE for swarm; unset it so mariadb
      # reads MYSQL_ROOT_PASSWORD directly from .env.
      MYSQL_ROOT_PASSWORD_FILE: null
    restart: unless-stopped
  migrate:
    image: quay.io/wikipedialibrary/twlight:branch_staging
    depends_on:
      - 'db'
    volumes:
      - type: bind
        source: /usr/local/backup
        target: /app/backup
      - type: bind
        source: ./media
        target: /app/media
    env_file:
      - path: ./conf/staging.twlight.env
        required: true
      - path: .env
        required: true
    command: >
      bash -c "/app/bin/twlight_backup.sh && /app/bin/virtualenv_migrate.sh"
    restart: on-failure
  twlight:
    image: quay.io/wikipedialibrary/twlight:branch_staging
    depends_on:
      - 'migrate'
    volumes:
      - type: bind
        source: /usr/local/backup
        target: /app/backup
    secrets: !reset null
    env_file:
      - path: ./conf/staging.twlight.env
        required: true
      - path: .env
        required: true
    restart: unless-stopped
  web:
    volumes:
      - type: volume
        target: /var/lib/nginx/cache
      - type: bind
        source: ./conf/staging.nginx.conf
        target: /etc/nginx/conf.d/default.conf
    restart: unless-stopped
